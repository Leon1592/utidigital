<!DOCTYPE html>
<html lang="pt-br ">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - UTI Digital</title>
  <link rel="shortcut icon" href="/uploads/images/ui.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles/global.css">
</head>

<body>
  <div class="app">

    <header>
      <div class="logo">
        <img src="/uploads/images/ui.png" alt="UTI Digital" height="50px">
      </div>
      <div class="badge-medico" id="roleBadge">...</div>
      <div class="doctor-name" id="doctorName">Carregando...</div>
      <div class="header-search" id="notificationBell" title="Notificacoes">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
    </header>

    <aside>
      <div class="menu-label">Menu Principal</div>

      <a href="/dashboard" class="nav-item active">Dashboard</a>
      <a href="/gestao-leitos" class="nav-item">Gestao de Leitos</a>
      <a href="/cadastro-pacientes" class="nav-item">Cadastro de Pacientes</a>
      <a href="/relatorios" class="nav-item">Relatorios</a>
      <a href="#" class="nav-item" id="navCadastroUsuarios" style="display: none;">Cadastro de Usuarios</a>
      <a href="/auth/logout" class="nav-item">Sair</a>
    </aside>

    <main>
      <h1 class="page-title">Dashboard</h1>
      <p id="welcomeMsg" style="color: #e8e8e8; font-size: 18px; text-align: center;">Carregando...</p>
    </main>

  </div>

  <script>
    async function loadUser() {
      try {
        const response = await fetch('/auth/user');
        if (!response.ok) {
          window.location.href = '/';
          return;
        }
        const data = await response.json();
        const user = data.user;
        document.getElementById('doctorName').textContent = user.name;

        const roleBadge = document.getElementById('roleBadge');
        const perfilLabels = { 'Medico': 'Medico', 'Enfermeiro': 'Enfermeiro', 'Admin': 'Administrador' };
        roleBadge.textContent = perfilLabels[user.perfil] || user.perfil;

        document.getElementById('welcomeMsg').textContent = `Bem-vindo, ${user.name}!`;

        if (user.perfil === 'Admin') {
          document.getElementById('navCadastroUsuarios').style.display = 'flex';
          document.getElementById('navCadastroUsuarios').href = '/cadastro-usuarios';
        }
      } catch (error) {
        console.error('Erro ao carregar usuario:', error);
      }
    }

    loadUser();
  </script>
</body>

</html>
