<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTI Digital - Cadastro de Pacientes</title>
    <link rel="shortcut icon" href="/uploads/images/ui.png" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/public/styles/global.css">
    <link rel="stylesheet" href="/public/styles/cadastro_pacientes.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">
          <img src="/uploads/images/ui.png" alt="UTI Digital" height="50px">
        </div>
        <div class="badge-medico" id="roleBadge">...</div>
        <div class="doctor-name" id="doctorName">Carregando...</div>
        <div class="header-search" id="searchIcon" title="Buscar Pacientes">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </header>

      <aside>
        <div class="menu-label">Menu Principal</div>

        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/gestao-leitos" class="nav-item">Gestao de Leitos</a>
        <a href="/cadastro-pacientes" class="nav-item active">Cadastro de Pacientes</a>
        <a href="#" class="nav-item">Relatorios</a>
        <a href="/auth/logout" class="nav-item">Sair</a>
      </aside>

      <main>
        <h1 class="page-title">Cadastro de pacientes</h1>

        <div class="form-card">
          <div class="field-group">
            <label class="field-label">Nome completo</label>
            <input class="field-input" type="text" id="nome" placeholder="" />
          </div>

          <div class="row-3">
            <div class="field-group">
              <label class="field-label">Data de nascimento</label>
              <input class="field-input" type="date" id="data_nascimento" />
            </div>
            <div class="field-group">
              <label class="field-label">CPF</label>
              <input class="field-input" type="text" id="cpf" placeholder="000.000.000-00" />
            </div>
            <div class="field-group">
              <label class="field-label">Sexo</label>
              <select class="field-input" id="sexo">
                <option value="">Selecione</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
              </select>
            </div>
          </div>

          <div class="row-3">
            <div class="field-group">
              <label class="field-label">CEP</label>
              <input class="field-input" type="text" id="cep" placeholder="00000-000" maxlength="9" />
            </div>
            <div class="field-group">
              <label class="field-label">Cidade</label>
              <input class="field-input" type="text" id="cidade" placeholder="" />
            </div>
            <div class="field-group">
              <label class="field-label">Estado (UF)</label>
              <input class="field-input" type="text" id="estado" placeholder="SP" maxlength="2" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Logradouro / Bairro</label>
            <input class="field-input" type="text" id="logradouro" placeholder="Rua, numero, bairro" />
          </div>

          <div class="row-2">
            <div class="field-group">
              <label class="field-label">Contato</label>
              <input class="field-input" type="text" id="contato" placeholder="" />
            </div>
            <div class="field-group">
              <label class="field-label">Motivo da Admissao</label>
              <input class="field-input" type="text" id="motivo" placeholder="" />
            </div>
          </div>

          <div class="bottom-row">
            <div></div>
            <button class="btn-admitir" id="btnAdmitir">Admitir Paciente</button>
          </div>
        </div>

        <div class="search-section" id="searchSection" style="display: none;">
          <div class="search-header">
            <h2 class="search-title">Pacientes Cadastrados</h2>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nome..." />
          </div>
          <div class="patients-list" id="patientsList">
            <p class="no-patients" id="noPatients">Nenhum paciente cadastrado.</p>
          </div>
        </div>
      </main>
    </div>

    <div class="search-modal" id="searchModal" style="display: none;">
      <div class="search-modal-content">
        <div class="search-modal-header">
          <h3>Buscar Paciente</h3>
          <button class="close-modal" id="closeModal">X</button>
        </div>
        <input type="text" class="search-modal-input" id="searchModalInput" placeholder="Digite o nome do paciente..." />
        <div class="search-modal-results" id="searchModalResults">
          <p class="no-results">Nenhum paciente encontrado.</p>
        </div>
      </div>
    </div>

    <script>
      async function loadUser() {
        try {
          const response = await fetch('/auth/user');
          if (!response.ok) {
            window.location.href = '/';
            return;
          }
          const data = await response.json();
          const user = data.user;
          document.getElementById('doctorName').textContent = user.name;

          const roleBadge = document.getElementById('roleBadge');
          const perfilLabels = { 'Medico': 'Medico', 'Enfermeiro': 'Enfermeiro', 'Admin': 'Administrador' };
          roleBadge.textContent = perfilLabels[user.perfil] || user.perfil;
        } catch (error) {
          console.error('Erro ao carregar usuario:', error);
        }
      }

      async function buscarCEP() {
        const cep = document.getElementById('cep').value.replace(/\D/g, '');

        if (cep.length !== 8) {
          return;
        }

        try {
          const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
          const data = await response.json();

          if (data.erro) {
            alert('CEP nao encontrado. Preencha manualmente.');
            return;
          }

          document.getElementById('logradouro').value = `${data.logradouro}, ${data.bairro}`;
          document.getElementById('cidade').value = data.localidade;
          document.getElementById('estado').value = data.uf;
        } catch (error) {
          console.error('Erro ao buscar CEP:', error);
          alert('Erro ao buscar CEP. Preencha manualmente.');
        }
      }

      document.getElementById('cep').addEventListener('blur', buscarCEP);

      async function admitirPaciente() {
        const paciente = {
          nome: document.getElementById('nome').value.trim(),
          data_nascimento: document.getElementById('data_nascimento').value,
          cpf: document.getElementById('cpf').value.trim(),
          sexo: document.getElementById('sexo').value,
          estado: document.getElementById('estado').value.trim(),
          contato_paciente: document.getElementById('contato').value.trim(),
          motivo_admissao: document.getElementById('motivo').value.trim()
        };

        if (!paciente.nome || !paciente.data_nascimento || !paciente.cpf || !paciente.sexo || !paciente.estado) {
          alert('Por favor, preencha todos os campos obrigatorios.');
          return;
        }

        try {
          const response = await fetch('/api/pacientes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(paciente)
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Erro ao cadastrar paciente');
          }

          alert('Paciente cadastrado com sucesso!');

          document.getElementById('nome').value = '';
          document.getElementById('data_nascimento').value = '';
          document.getElementById('cpf').value = '';
          document.getElementById('sexo').value = '';
          document.getElementById('cep').value = '';
          document.getElementById('cidade').value = '';
          document.getElementById('estado').value = '';
          document.getElementById('logradouro').value = '';
          document.getElementById('contato').value = '';
          document.getElementById('motivo').value = '';

          loadPacientes();
        } catch (error) {
          console.error('Erro ao cadastrar:', error);
          alert(error.message || 'Erro ao cadastrar paciente');
        }
      }

      document.getElementById('btnAdmitir').addEventListener('click', admitirPaciente);

      async function loadPacientes() {
        try {
          const response = await fetch('/api/pacientes');
          const pacientes = await response.json();

          const searchSection = document.getElementById('searchSection');
          const patientsList = document.getElementById('patientsList');

          searchSection.style.display = 'block';

          if (pacientes.length === 0) {
            patientsList.innerHTML = '<p class="no-patients">Nenhum paciente cadastrado.</p>';
          } else {
            patientsList.innerHTML = '';
            pacientes.forEach(paciente => {
              const card = document.createElement('div');
              card.className = 'patient-card';
              card.innerHTML = `
                <div class="patient-info">
                  <span class="patient-name">${paciente.nome}</span>
                  <span class="patient-detail">CPF: ${paciente.cpf}</span>
                  <span class="patient-detail">Sexo: ${paciente.sexo}</span>
                  <span class="patient-detail">Motivo: ${paciente.motivo_admissao}</span>
                </div>
              `;
              patientsList.appendChild(card);
            });
          }
        } catch (error) {
          console.error('Erro ao carregar pacientes:', error);
        }
      }

      async function searchPacientes(query) {
        try {
          const response = await fetch(`/api/pacientes?nome=${encodeURIComponent(query)}`);
          const pacientes = await response.json();
          return pacientes;
        } catch (error) {
          console.error('Erro na busca:', error);
          return [];
        }
      }

      function showSearchModal() {
        const modal = document.getElementById('searchModal');
        modal.style.display = 'flex';
        document.getElementById('searchModalInput').focus();
      }

      function hideSearchModal() {
        const modal = document.getElementById('searchModal');
        modal.style.display = 'none';
        document.getElementById('searchModalInput').value = '';
        document.getElementById('searchModalResults').innerHTML = '<p class="no-results">Nenhum paciente encontrado.</p>';
      }

      document.getElementById('searchIcon').addEventListener('click', showSearchModal);
      document.getElementById('closeModal').addEventListener('click', hideSearchModal);

      document.getElementById('searchModalInput').addEventListener('input', async function() {
        const query = this.value.trim();
        const resultsDiv = document.getElementById('searchModalResults');

        if (query.length < 2) {
          resultsDiv.innerHTML = '<p class="no-results">Digite pelo menos 2 caracteres para buscar.</p>';
          return;
        }

        const pacientes = await searchPacientes(query);

        if (pacientes.length === 0) {
          resultsDiv.innerHTML = '<p class="no-results">Nenhum paciente encontrado.</p>';
        } else {
          resultsDiv.innerHTML = '';
          pacientes.forEach(paciente => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.innerHTML = `
              <span class="result-name">${paciente.nome}</span>
              <span class="result-detail">${paciente.cpf}</span>
            `;
            resultsDiv.appendChild(item);
          });
        }
      });

      document.getElementById('searchInput').addEventListener('input', async function() {
        const query = this.value.trim();

        if (query.length === 0) {
          loadPacientes();
          return;
        }

        const pacientes = await searchPacientes(query);
        const patientsList = document.getElementById('patientsList');

        if (pacientes.length === 0) {
          patientsList.innerHTML = '<p class="no-patients">Nenhum paciente encontrado.</p>';
        } else {
          patientsList.innerHTML = '';
          pacientes.forEach(paciente => {
            const card = document.createElement('div');
            card.className = 'patient-card';
            card.innerHTML = `
              <div class="patient-info">
                <span class="patient-name">${paciente.nome}</span>
                <span class="patient-detail">CPF: ${paciente.cpf}</span>
                <span class="patient-detail">Sexo: ${paciente.sexo}</span>
                <span class="patient-detail">Motivo: ${paciente.motivo_admissao}</span>
              </div>
            `;
            patientsList.appendChild(card);
          });
        }
      });

      loadUser();
      loadPacientes();
    </script>
  </body>
</html>
