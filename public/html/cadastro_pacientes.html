<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTI Digital - Cadastro de Pacientes</title>
    <link rel="shortcut icon" href="/uploads/images/ui.png" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/cadastro_pacientes.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">
          <img src="/uploads/images/ui.png" alt="UTI Digital" height="50px">
        </div>
        <div class="badge-medico" id="roleBadge">...</div>
        <div class="doctor-name" id="doctorName">Carregando...</div>
        <div class="header-search" id="searchIcon" title="Buscar Pacientes">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </header>

      <aside>
        <div class="menu-label">Menu Principal</div>

        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/gestao-leitos" class="nav-item">Gestao de Leitos</a>
        <a href="/cadastro-pacientes" class="nav-item active">Cadastro de Pacientes</a>
        <a href="/relatorios" class="nav-item">Relatorios</a>
        <a href="#" class="nav-item" id="navCadastroUsuarios" style="display: none;">Cadastro de Usuarios</a>
        <form action="/auth/logout" method="POST" style="display:inline">
          <button type="submit" class="nav-item logout-btn" style="background:none;border:none;color:inherit;font:inherit;cursor:pointer;width:100%;text-align:left;padding:12px 16px;">Sair</button>
        </form>
      </aside>

      <main>
        <h1 class="page-title">Cadastro de pacientes</h1>

        <div class="form-card">
          <div class="field-group">
            <label class="field-label">Nome completo</label>
            <input class="field-input" type="text" id="nome" placeholder="" required minlength="3" maxlength="255" />
          </div>

          <div class="row-3">
            <div class="field-group">
              <label class="field-label">Data de nascimento</label>
              <input class="field-input" type="date" id="data_nascimento" required max="9999-12-31" />
            </div>
            <div class="field-group">
              <label class="field-label">CPF</label>
              <input class="field-input" type="text" id="cpf" placeholder="000.000.000-00" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Formato: 000.000.000-00" />
            </div>
            <div class="field-group">
              <label class="field-label">Sexo</label>
              <select class="field-input" id="sexo" required>
                <option value="">Selecione</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
              </select>
            </div>
          </div>

          <div class="row-3">
            <div class="field-group">
              <label class="field-label">CEP</label>
              <input class="field-input" type="text" id="cep" placeholder="00000-000" maxlength="9" />
            </div>
            <div class="field-group">
              <label class="field-label">Cidade</label>
              <input class="field-input" type="text" id="cidade" placeholder="" />
            </div>
            <div class="field-group">
              <label class="field-label">Estado (UF)</label>
              <input class="field-input" type="text" id="estado" placeholder="SP" maxlength="2" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Logradouro / Bairro</label>
            <input class="field-input" type="text" id="logradouro" placeholder="Rua, numero, bairro" />
          </div>

          <div class="row-2">
            <div class="field-group">
              <label class="field-label">Contato</label>
              <input class="field-input" type="tel" id="contato" placeholder="(00) 00000-0000" required minlength="10" maxlength="15" />
            </div>
            <div class="field-group">
              <label class="field-label">Motivo da Admissao</label>
              <input class="field-input" type="text" id="motivo" placeholder="" />
            </div>
          </div>

          <div class="bottom-row">
            <div></div>
            <button class="btn-admitir" id="btnAdmitir">Admitir Paciente</button>
          </div>
        </div>

        <div class="search-section" id="searchSection" style="display: none;">
          <div class="search-header">
            <h2 class="search-title">Pacientes Cadastrados</h2>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nome..." />
          </div>
          <div class="patients-list" id="patientsList">
            <p class="no-patients" id="noPatients">Nenhum paciente cadastrado.</p>
          </div>
        </div>
      </main>
    </div>

    <div class="search-modal" id="searchModal" style="display: none;">
      <div class="search-modal-content">
        <div class="search-modal-header">
          <h3>Buscar Paciente</h3>
          <button class="close-modal" id="closeModal">X</button>
        </div>
        <input type="text" class="search-modal-input" id="searchModalInput" placeholder="Digite o nome do paciente..." />
        <div class="search-modal-results" id="searchModalResults">
          <p class="no-results">Nenhum paciente encontrado.</p>
        </div>
      </div>
    </div>

    <div class="patient-detail-modal" id="patientDetailModal" style="display: none;">
      <div class="patient-detail-content">
        <div class="patient-detail-header">
          <h3>Detalhes do Paciente</h3>
          <button class="close-modal" id="closeDetailModal">X</button>
        </div>
        <div class="patient-detail-body" id="patientDetailBody">
        </div>
        <div class="patient-detail-footer">
          <button class="btn-excluir" id="btnExcluir">Excluir Paciente</button>
        </div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      async function buscarCEP() {
        const cep = document.getElementById('cep').value.replace(/\D/g, '');

        if (cep.length !== 8) {
          return;
        }

        try {
          const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
          const data = await response.json();

          if (data.erro) {
            alert('CEP nao encontrado. Preencha manualmente.');
            return;
          }

          document.getElementById('logradouro').value = `${data.logradouro}, ${data.bairro}`;
          document.getElementById('cidade').value = data.localidade;
          document.getElementById('estado').value = data.uf;
        } catch (error) {
          console.error('Erro ao buscar CEP:', error);
          alert('Erro ao buscar CEP. Preencha manualmente.');
        }
      }

      document.getElementById('cep').addEventListener('blur', buscarCEP);

      async function admitirPaciente() {
        const paciente = {
          nome: document.getElementById('nome').value.trim(),
          data_nascimento: document.getElementById('data_nascimento').value,
          cpf: document.getElementById('cpf').value.trim(),
          sexo: document.getElementById('sexo').value,
          estado: document.getElementById('estado').value.trim(),
          contato_paciente: document.getElementById('contato').value.trim(),
          motivo_admissao: document.getElementById('motivo').value.trim(),
          logradouro: document.getElementById('logradouro').value.trim(),
          cidade: document.getElementById('cidade').value.trim(),
          cep: document.getElementById('cep').value.trim()
        };

        if (!paciente.nome || paciente.nome.length < 3) {
          alert('Por favor, informe o nome completo (minimo 3 caracteres).');
          return;
        }
        if (!paciente.data_nascimento) {
          alert('Por favor, informe a data de nascimento.');
          return;
        }
        const dataNasc = new Date(paciente.data_nascimento);
        if (isNaN(dataNasc.getTime()) || dataNasc > new Date()) {
          alert('Data de nascimento invalida.');
          return;
        }
        if (!paciente.cpf) {
          alert('Por favor, informe o CPF.');
          return;
        }
        if (!/^\d{3}\.\d{3}\.\d{3}-\d{2}$/.test(paciente.cpf)) {
          alert('CPF invalido. Use o formato 000.000.000-00.');
          return;
        }
        if (!paciente.sexo) {
          alert('Por favor, selecione o sexo.');
          return;
        }
        if (!paciente.contato_paciente || paciente.contato_paciente.length < 10) {
          alert('Por favor, informe um contato valido (minimo 10 digitos).');
          return;
        }

        try {
          const response = await fetch('/api/pacientes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(paciente)
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Erro ao cadastrar paciente');
          }

          alert('Paciente cadastrado com sucesso!');

          document.getElementById('nome').value = '';
          document.getElementById('data_nascimento').value = '';
          document.getElementById('cpf').value = '';
          document.getElementById('sexo').value = '';
          document.getElementById('cep').value = '';
          document.getElementById('cidade').value = '';
          document.getElementById('estado').value = '';
          document.getElementById('logradouro').value = '';
          document.getElementById('contato').value = '';
          document.getElementById('motivo').value = '';

          loadPacientes();
        } catch (error) {
          console.error('Erro ao cadastrar:', error);
          alert(error.message || 'Erro ao cadastrar paciente');
        }
      }

      document.getElementById('btnAdmitir').addEventListener('click', admitirPaciente);

      async function loadPacientes() {
        try {
          const response = await fetch('/api/pacientes');
          const pacientes = await response.json();

          const searchSection = document.getElementById('searchSection');
          const patientsList = document.getElementById('patientsList');

          searchSection.style.display = 'block';

          if (pacientes.length === 0) {
            patientsList.innerHTML = '<p class="no-patients">Nenhum paciente cadastrado.</p>';
          } else {
            patientsList.innerHTML = '';
            pacientes.forEach(paciente => {
              const card = document.createElement('div');
              card.className = 'patient-card';
              card.onclick = () => showPatientDetail(paciente);
              card.innerHTML = `
                <div class="patient-info">
                  <span class="patient-name">${escapeHTML(paciente.nome)}</span>
                  <span class="patient-detail">CPF: ${escapeHTML(paciente.cpf)}</span>
                  <span class="patient-detail">Sexo: ${escapeHTML(paciente.sexo)}</span>
                  <span class="patient-detail">Motivo: ${escapeHTML(paciente.motivo_admissao)}</span>
                </div>
              `;
              patientsList.appendChild(card);
            });
          }
        } catch (error) {
          console.error('Erro ao carregar pacientes:', error);
        }
      }

      let pacienteAtual = null;

      function showPatientDetail(paciente) {
        pacienteAtual = paciente;
        const modal = document.getElementById('patientDetailModal');
        const body = document.getElementById('patientDetailBody');
        
        body.innerHTML = `
          <div class="detail-row">
            <span class="detail-label">Nome:</span>
            <span class="detail-value">${escapeHTML(paciente.nome)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">CPF:</span>
            <span class="detail-value">${escapeHTML(paciente.cpf)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Data de Nascimento:</span>
            <span class="detail-value">${escapeHTML(paciente.data_nascimento)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Sexo:</span>
            <span class="detail-value">${escapeHTML(paciente.sexo)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Contato:</span>
            <span class="detail-value">${escapeHTML(paciente.contato_paciente) || 'Não informado'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">CEP:</span>
            <span class="detail-value">${escapeHTML(paciente.cep) || 'Não informado'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Endereço:</span>
            <span class="detail-value">${escapeHTML(paciente.logradouro) || 'Não informado'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Cidade/Estado:</span>
            <span class="detail-value">${paciente.cidade ? escapeHTML(paciente.cidade) + ' - ' + escapeHTML(paciente.estado) : 'Não informado'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Motivo da Admissão:</span>
            <span class="detail-value">${escapeHTML(paciente.motivo_admissao)}</span>
          </div>
        `;
        
        modal.style.display = 'flex';
      }

      async function excluirPaciente() {
        if (!pacienteAtual) return;
        
        const confirmacao = confirm(`Tem certeza que deseja excluir o paciente "${pacienteAtual.nome}"?`);
        if (!confirmacao) return;
        
        try {
          const response = await fetch(`/api/pacientes/${pacienteAtual.id}`, {
            method: 'DELETE'
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || 'Erro ao excluir paciente');
          }
          
          alert('Paciente excluído com sucesso!');
          hidePatientDetail();
          loadPacientes();
        } catch (error) {
          console.error('Erro ao excluir:', error);
          alert(error.message || 'Erro ao excluir paciente');
        }
      }

      document.getElementById('btnExcluir').addEventListener('click', excluirPaciente);

      function hidePatientDetail() {
        const modal = document.getElementById('patientDetailModal');
        modal.style.display = 'none';
      }

      document.getElementById('closeDetailModal').addEventListener('click', hidePatientDetail);

      document.getElementById('patientDetailModal').addEventListener('click', function(e) {
        if (e.target === this) {
          hidePatientDetail();
        }
      });

      async function searchPacientes(query) {
        try {
          const response = await fetch(`/api/pacientes?nome=${encodeURIComponent(query)}`);
          const pacientes = await response.json();
          return pacientes;
        } catch (error) {
          console.error('Erro na busca:', error);
          return [];
        }
      }

      function showSearchModal() {
        const modal = document.getElementById('searchModal');
        modal.style.display = 'flex';
        document.getElementById('searchModalInput').focus();
      }

      function hideSearchModal() {
        const modal = document.getElementById('searchModal');
        modal.style.display = 'none';
        document.getElementById('searchModalInput').value = '';
        document.getElementById('searchModalResults').innerHTML = '<p class="no-results">Nenhum paciente encontrado.</p>';
      }

      document.getElementById('searchIcon').addEventListener('click', showSearchModal);
      document.getElementById('closeModal').addEventListener('click', hideSearchModal);

      document.getElementById('searchModal').addEventListener('click', function(e) {
        if (e.target === this) {
          hideSearchModal();
        }
      });

      let searchModalTimer;
      document.getElementById('searchModalInput').addEventListener('input', function() {
        clearTimeout(searchModalTimer);
        const query = this.value.trim();
        const resultsDiv = document.getElementById('searchModalResults');

        if (query.length < 2) {
          resultsDiv.innerHTML = '<p class="no-results">Digite pelo menos 2 caracteres para buscar.</p>';
          return;
        }

        searchModalTimer = setTimeout(async () => {
          const pacientes = await searchPacientes(query);

          if (pacientes.length === 0) {
            resultsDiv.innerHTML = '<p class="no-results">Nenhum paciente encontrado.</p>';
          } else {
            resultsDiv.innerHTML = '';
            pacientes.forEach(paciente => {
              const item = document.createElement('div');
              item.className = 'search-result-item';
              item.onclick = () => {
                showPatientDetail(paciente);
                hideSearchModal();
              };
              item.innerHTML = `
                <span class="result-name">${escapeHTML(paciente.nome)}</span>
                <span class="result-detail">${escapeHTML(paciente.cpf)}</span>
              `;
              resultsDiv.appendChild(item);
            });
          }
        }, 300);
      });

      let searchInputTimer;
      document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchInputTimer);
        const query = this.value.trim();

        if (query.length === 0) {
          loadPacientes();
          return;
        }

        searchInputTimer = setTimeout(async () => {
          const pacientes = await searchPacientes(query);
          const patientsList = document.getElementById('patientsList');

          if (pacientes.length === 0) {
            patientsList.innerHTML = '<p class="no-patients">Nenhum paciente encontrado.</p>';
          } else {
            patientsList.innerHTML = '';
            pacientes.forEach(paciente => {
              const card = document.createElement('div');
              card.className = 'patient-card';
              card.onclick = () => showPatientDetail(paciente);
              card.innerHTML = `
                <div class="patient-info">
                  <span class="patient-name">${escapeHTML(paciente.nome)}</span>
                  <span class="patient-detail">CPF: ${escapeHTML(paciente.cpf)}</span>
                  <span class="patient-detail">Sexo: ${escapeHTML(paciente.sexo)}</span>
                  <span class="patient-detail">Motivo: ${escapeHTML(paciente.motivo_admissao)}</span>
                </div>
              `;
              patientsList.appendChild(card);
            });
          }
      }, 300);
    });

      loadUser();
      loadPacientes();
    </script>
  </body>
</html>
