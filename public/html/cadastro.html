<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTI Digital – Cadastro de Pacientes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/cadastro.css" />
  </head>
  <body>
    <div class="app">
      <!-- HEADER -->
      <header>
        <div class="logo">
          <div class="logo-top">U <span class="cross">✝</span> I</div>
          <div class="logo-sub">digital</div>
        </div>
        <div class="badge-medico">Médico</div>
        <div class="doctor-name">Dr. Marcelo Rosa</div>
        <div class="header-search">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="22" y2="22" />
          </svg>
        </div>
      </header>

      <aside>
        <div class="menu-label">Menu Principal</div>

        <div class="nav-item">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </div>

        <div class="nav-item">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 7V5a2 2 0 0 0-4 0v2" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          Leitos
        </div>

        <div class="nav-item active">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Cadastros
        </div>

        <div class="nav-item">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" />
            <line x1="8" y1="13" x2="16" y2="13" />
            <line x1="8" y1="17" x2="16" y2="17" />
          </svg>
          Relatórios
        </div>
      </aside>

      <main>
        <h1 class="page-title">Cadastro de pacientes</h1>

        <div class="form-card">
          <div class="field-group">
            <label class="field-label">Nome completo</label>
            <input class="field-input" type="text" placeholder="" />
          </div>

          <div class="row-3">
            <div class="field-group">
              <label class="field-label">Data de nascimento</label>
              <input class="field-input" type="text" placeholder="DD/MM/AAAA" />
            </div>
            <div class="field-group">
              <label class="field-label">CPF</label>
              <input
                class="field-input"
                type="text"
                placeholder="000.000.000-00"
              />
            </div>
            <div class="field-group">
              <label class="field-label">Sexo</label>
              <input class="field-input" type="text" placeholder="" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Endereço</label>
            <input class="field-input" type="text" placeholder="" />
          </div>

          <div class="bottom-row">
            <div class="field-group">
              <label class="field-label">Contato \ Resposável</label>
              <input class="field-input" type="text" placeholder="" />
            </div>
            <button class="btn-admitir">
              <span class="envelope-icon">
                <svg
                  viewBox="0 0 24 20"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <rect x="0" y="0" width="24" height="20" rx="3" fill="#bbb" />
                  <path
                    d="M0 3 L12 12 L24 3"
                    stroke="#888"
                    stroke-width="1.5"
                    fill="none"
                  />
                  <rect
                    x="14"
                    y="8"
                    width="10"
                    height="8"
                    rx="1.5"
                    fill="#4a90d9"
                  />
                  <line
                    x1="16"
                    y1="11"
                    x2="22"
                    y2="11"
                    stroke="#fff"
                    stroke-width="1.2"
                    stroke-linecap="round"
                  />
                  <line
                    x1="19"
                    y1="9"
                    x2="19"
                    y2="15"
                    stroke="#fff"
                    stroke-width="1.2"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
              Admitir Paciente
            </button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
