<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Leito - UTI Digital</title>
  <link rel="shortcut icon" href="/uploads/images/ui.png" type="image/x-icon" />
</head>
<body>
  <h1>Testando...</h1>
  <pre id="out">Aguardando...</pre>
  <script>
    document.getElementById('out').textContent = 'Script started: ' + new Date().toISOString();

    fetch('/debug-session')
      .then(r => r.json())
      .then(d => {
        document.getElementById('out').textContent = 'Session: ' + JSON.stringify(d, null, 2);
      })
      .catch(e => {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      });

    fetch('/api/leitos/1')
      .then(r => r.json())
      .then(d => {
        document.getElementById('out').textContent += '\nLeito: ' + d.paciente_nome + ' | Status: ' + d.status;
      })
      .catch(e => {
        document.getElementById('out').textContent += '\nLeito error: ' + e.message;
      });

    fetch('/auth/user')
      .then(r => r.json())
      .then(d => {
        document.getElementById('out').textContent += '\nUser: ' + JSON.stringify(d);
      })
      .catch(e => {
        document.getElementById('out').textContent += '\nAuth error: ' + e.message;
      });
  </script>
</body>
</html>
