<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Leitos - UTI Digital</title>
  <link rel="shortcut icon" href="/uploads/images/ui.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles/global.css">
  <link rel="stylesheet" href="/public/styles/gestao_leitos.css">
</head>

<body>
  <div class="app">

    <header>
      <div class="logo">
        <img src="/uploads/images/ui.png" alt="UTI Digital" height="50px">
      </div>
      <div class="badge-medico" id="roleBadge">...</div>
      <div class="doctor-name" id="doctorName">Carregando...</div>
      <div class="header-search" id="notificationBell" title="Notificacoes">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
    </header>

    <aside>
      <div class="menu-label">Menu Principal</div>

      <a href="/dashboard" class="nav-item">Dashboard</a>
      <a href="/gestao-leitos" class="nav-item active">Gestao de Leitos</a>
      <a href="/cadastro-pacientes" class="nav-item">Cadastro de Pacientes</a>
      <a href="/relatorios" class="nav-item">Relatorios</a>
      <a href="#" class="nav-item" id="navCadastroUsuarios" style="display: none;">Cadastro de Usuarios</a>
      <a href="/auth/logout" class="nav-item">Sair</a>
    </aside>

    <main>
      <h1 class="page-title">Gestao de Leitos</h1>

      <div class="header-actions">
        <a href="/internar" class="btn-internar">+ Internar Paciente</a>
      </div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot disponivel"></span>
          <span class="legend-text disponivel">Disponivel</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot ocupado"></span>
          <span class="legend-text ocupado">Ocupado</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot indisponivel"></span>
          <span class="legend-text indisponivel">Indisponivel</span>
        </div>
      </div>

      <div class="beds-grid" id="bedsGrid">
        <p style="padding: 20px;">Carregando leitos...</p>
      </div>
    </main>

  </div>

  <script>
    async function loadUser() {
      try {
        const response = await fetch('/auth/user');
        if (!response.ok) {
          window.location.href = '/';
          return;
        }
        const data = await response.json();
        const user = data.user;
        document.getElementById('doctorName').textContent = user.name;
        
        const roleBadge = document.querySelector('.badge-medico');
        const perfilLabels = { 'Medico': 'Medico', 'Enfermeiro': 'Enfermeiro', 'Admin': 'Administrador' };
        roleBadge.textContent = perfilLabels[user.perfil] || user.perfil;
        
        if (user.perfil === 'Admin') {
          document.getElementById('navCadastroUsuarios').style.display = 'flex';
          document.getElementById('navCadastroUsuarios').href = '/cadastro-usuarios';
        }
      } catch (error) {
        console.error('Erro ao carregar usuario:', error);
      }
    }

    async function loadBeds() {
      try {
        const response = await fetch('/api/leitos');
        const leitos = await response.json();
        
        const grid = document.getElementById('bedsGrid');
        grid.innerHTML = '';
        
        if (leitos.length === 0) {
          grid.innerHTML = '<p style="padding: 20px;">Nenhum leito cadastrado. Entre em contato com o administrador.</p>';
          return;
        }
        
        leitos.forEach(leito => {
          const statusClass = leito.status || 'disponivel';
          const pacienteNome = leito.paciente_nome || '-';
          const dataInternacao = leito.data_internacao 
            ? new Date(leito.data_internacao).toLocaleDateString('pt-BR') 
            : '-';
          const observacoes = leito.observacoes || '-';
          const isClickable = leito.status === 'ocupado';
          
          const bedCard = document.createElement('div');
          bedCard.className = 'bed-card' + (isClickable ? ' clickable' : '');
          
          if (isClickable) {
            bedCard.style.cursor = 'pointer';
            bedCard.onclick = () => { window.location.href = '/leito/' + leito.id; };
          }
          
          bedCard.innerHTML = `
            <span class="bed-title ${statusClass}">Leito ${leito.numero}</span>
            <span class="bed-info">Nome: ${pacienteNome}</span>
            <span class="bed-info">Situacao: ${observacoes}</span>
            <span class="bed-info">Data de Internacao: ${dataInternacao}</span>
            ${isClickable ? '<span class="bed-info" style="color: #4caf50; font-size: 12px;">Clique para ver detalhes</span>' : ''}
          `;
          grid.appendChild(bedCard);
        });
      } catch (error) {
        console.error('Erro ao carregar leitos:', error);
        document.getElementById('bedsGrid').innerHTML = '<p style="padding: 20px; color: red;">Erro ao carregar leitos. Tente novamente mais tarde.</p>';
      }
    }

    loadBeds();
    loadUser();
  </script>
</body>

</html>
