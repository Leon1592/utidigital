<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Leitos - UTI Digital</title>
  <link rel="shortcut icon" href="/uploads/images/ui.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/gestao_leitos.css">
  <link rel="stylesheet" href="/styles/cadastro_pacientes.css">
</head>

<body>
  <div class="app">

    <header>
      <div class="logo">
        <img src="/uploads/images/ui.png" alt="UTI Digital" height="50px">
      </div>
      <div class="badge-medico" id="roleBadge">...</div>
      <div class="doctor-name" id="doctorName">Carregando...</div>
      <div class="header-search" id="searchIcon" title="Buscar Leitos">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </div>
    </header>

    <aside>
      <div class="menu-label">Menu Principal</div>

      <a href="/dashboard" class="nav-item">Dashboard</a>
      <a href="/gestao-leitos" class="nav-item active">Gestao de Leitos</a>
      <a href="/cadastro-pacientes" class="nav-item">Cadastro de Pacientes</a>
      <a href="/relatorios" class="nav-item">Relatorios</a>
      <a href="#" class="nav-item" id="navCadastroUsuarios" style="display: none;">Cadastro de Usuarios</a>
      <a href="/auth/logout" class="nav-item">Sair</a>
    </aside>

    <main>
      <h1 class="page-title">Gestao de Leitos</h1>

      <div class="header-actions">
        <a href="/internar" class="btn-internar">+ Internar Paciente</a>
        <button class="btn-internar" id="btnAddLeito" style="display: none; margin-left: 10px;">+ Adicionar Leito</button>
      </div>

      <div id="addLeitoModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #0a2342; border-radius: 16px; padding: 24px; width: 400px; border: 2px solid #00B4D8;">
          <h3 style="color: #00B4D8; margin-top: 0;">Adicionar Novo Leito</h3>
          <div style="margin-bottom: 15px;">
            <label style="color: #fff; display: block; margin-bottom: 5px;">Número do Leito:</label>
            <input type="number" id="novoLeitoNumero" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #00B4D8; background: #1a1a2e; color: #fff;">
          </div>
          <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button id="btnCancelAdd" style="padding: 10px 20px; border-radius: 8px; border: none; background: #666; color: #fff; cursor: pointer;">Cancelar</button>
            <button id="btnConfirmAdd" style="padding: 10px 20px; border-radius: 8px; border: none; background: #00B4D8; color: #0a2342; font-weight: bold; cursor: pointer;">Adicionar</button>
          </div>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot disponivel"></span>
          <span class="legend-text disponivel">Disponivel</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot ocupado"></span>
          <span class="legend-text ocupado">Ocupado</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot indisponivel"></span>
          <span class="legend-text indisponivel">Indisponivel</span>
        </div>
      </div>

      <div class="beds-grid" id="bedsGrid">
        <p style="padding: 20px;">Carregando leitos...</p>
      </div>
</main>

  </div>

  <div class="search-modal" id="searchModal" style="display: none;">
    <div class="search-modal-content">
      <div class="search-modal-header">
        <h3>Buscar Leito</h3>
        <button class="close-modal" id="closeModal">X</button>
      </div>
      <input type="text" class="search-modal-input" id="searchModalInput" placeholder="Digite o número do leito ou nome do paciente..." />
      <div class="search-modal-results" id="searchModalResults">
        <p class="no-results">Nenhum resultado encontrado.</p>
      </div>
    </div>
  </div>

<script>
let isUserAdmin = false;
    
    async function loadUser() {
      try {
        const response = await fetch('/auth/user');
        if (!response.ok) {
          window.location.href = '/';
          return;
        }
        const data = await response.json();
        const user = data.user;
        document.getElementById('doctorName').textContent = user.name;
        
        const roleBadge = document.querySelector('.badge-medico');
        const perfilLabels = { 'Medico': 'Medico', 'Enfermeiro': 'Enfermeiro', 'Admin': 'Administrador' };
        roleBadge.textContent = perfilLabels[user.perfil] || user.perfil;
        
        isUserAdmin = user.perfil === 'Admin';
        
        if (isUserAdmin) {
          document.getElementById('navCadastroUsuarios').style.display = 'flex';
          document.getElementById('navCadastroUsuarios').href = '/cadastro-usuarios';
          document.getElementById('btnAddLeito').style.display = 'inline-block';
          
          document.getElementById('btnAddLeito').addEventListener('click', () => {
            document.getElementById('addLeitoModal').style.display = 'flex';
            document.getElementById('novoLeitoNumero').value = '';
            document.getElementById('novoLeitoNumero').focus();
          });
          
          document.getElementById('btnCancelAdd').addEventListener('click', () => {
            document.getElementById('addLeitoModal').style.display = 'none';
          });
          
          document.getElementById('addLeitoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('addLeitoModal')) {
              document.getElementById('addLeitoModal').style.display = 'none';
            }
          });
          
          document.getElementById('btnConfirmAdd').addEventListener('click', async () => {
            const numero = parseInt(document.getElementById('novoLeitoNumero').value);
            if (!numero || numero <= 0) {
              alert('Por favor, insira um número válido para o leito.');
              return;
            }
            try {
              const res = await fetch('/api/leitos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numero: numero, status: 'disponivel' })
              });
              if (res.ok) {
                alert('Leito adicionado com sucesso!');
                document.getElementById('addLeitoModal').style.display = 'none';
                loadBeds();
              } else {
                const err = await res.json();
                alert('Erro ao adicionar leito: ' + (err.error || 'Erro desconhecido'));
              }
            } catch (err) {
              alert('Erro ao adicionar leito');
            }
          });
        }
      } catch (error) {
        console.error('Erro ao carregar usuario:', error);
      }
    }

    async function loadBeds() {
      try {
        const response = await fetch('/api/leitos');
        const leitos = await response.json();
        
        const grid = document.getElementById('bedsGrid');
        grid.innerHTML = '';
        
        if (leitos.length === 0) {
          grid.innerHTML = '<p style="padding: 20px;">Nenhum leito cadastrado. Entre em contato com o administrador.</p>';
          return;
        }
        
        const isAdmin = document.getElementById('btnAddLeito') && document.getElementById('btnAddLeito').style.display !== 'none';
        
        leitos.forEach(leito => {
          const statusClass = leito.status || 'disponivel';
          const pacienteNome = leito.paciente_nome || '-';
          const dataInternacao = leito.data_internacao 
            ? new Date(leito.data_internacao).toLocaleDateString('pt-BR') 
            : '-';
          const statusLabels = { 'disponivel': 'Disponivel', 'ocupado': 'Ocupado', 'indisponivel': 'Indisponivel' };
          const statusDisplay = statusLabels[leito.status] || leito.status || '-';
          const isClickable = leito.status === 'ocupado';
          
          const bedCard = document.createElement('div');
          bedCard.className = 'bed-card' + (isClickable ? ' clickable' : '');
          
          if (isClickable) {
            bedCard.style.cursor = 'pointer';
            bedCard.onclick = () => { window.location.href = '/leito/' + leito.id; };
          }
          
          const deleteBtn = isUserAdmin ? `<span class="bed-delete" data-id="${leito.id}" style="color: #ff4444; cursor: pointer; font-size: 12px; margin-left: 10px;">[Excluir]</span>` : '';
          
          bedCard.innerHTML = `
            <span class="bed-title ${statusClass}">Leito ${leito.numero}${deleteBtn}</span>
            <span class="bed-info">Nome: ${pacienteNome}</span>
            <span class="bed-info">Situacao: ${statusDisplay}</span>
            <span class="bed-info">Data de Internacao: ${dataInternacao}</span>
            ${isClickable ? '<span class="bed-info" style="color: #4caf50; font-size: 12px;">Clique para ver detalhes</span>' : ''}
          `;
          grid.appendChild(bedCard);
        });
        
        if (isUserAdmin) {
          document.querySelectorAll('.bed-delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              e.stopPropagation();
              const leitoId = btn.dataset.id;
              if (confirm('Tem certeza que deseja excluir este leito?')) {
                try {
                  const res = await fetch('/api/leitos/' + leitoId, { method: 'DELETE' });
                  if (res.ok) {
                    alert('Leito excluído com sucesso!');
                    loadBeds();
                  } else {
                    alert('Erro ao excluir leito');
                  }
                } catch (err) {
                  alert('Erro ao excluir leito');
                }
              }
            });
          });
        }
      } catch (error) {
        console.error('Erro ao carregar leitos:', error);
        document.getElementById('bedsGrid').innerHTML = '<p style="padding: 20px; color: red;">Erro ao carregar leitos. Tente novamente mais tarde.</p>';
      }
    }

    loadBeds();
    loadUser();

    if (document.getElementById('searchIcon')) {
      document.getElementById('searchIcon').addEventListener('click', showSearchModal);
    }
    if (document.getElementById('closeModal')) {
      document.getElementById('closeModal').addEventListener('click', hideSearchModal);
    }
    if (document.getElementById('searchModal')) {
      document.getElementById('searchModal').addEventListener('click', function(e) {
        if (e.target.id === 'searchModal') hideSearchModal();
      });
    }
    if (document.getElementById('searchModalInput')) {
      document.getElementById('searchModalInput').addEventListener('input', searchLeitos);
    }

    function showSearchModal() {
      document.getElementById('searchModal').style.display = 'flex';
      document.getElementById('searchModalInput').value = '';
      document.getElementById('searchModalInput').focus();
      document.getElementById('searchModalResults').innerHTML = '<p class="no-results">Digite para buscar...</p>';
    }

    function hideSearchModal() {
      document.getElementById('searchModal').style.display = 'none';
    }

    async function searchLeitos() {
      const query = document.getElementById('searchModalInput').value.trim().toLowerCase();
      const resultsDiv = document.getElementById('searchModalResults');
      
      if (query.length < 1) {
        resultsDiv.innerHTML = '<p class="no-results">Digite para buscar...</p>';
        return;
      }

      try {
        const res = await fetch('/api/leitos');
        if (!res.ok) {
          resultsDiv.innerHTML = '<p class="no-results">Erro ao carregar leitos.</p>';
          return;
        }
        const leitos = await res.json();
        
        const filtered = leitos.filter(item => {
          const nome = (item.paciente_nome || '').toLowerCase();
          const numero = String(item.numero);
          return nome.includes(query) || numero.includes(query);
        });

        if (filtered.length === 0) {
          resultsDiv.innerHTML = '<p class="no-results">Nenhum resultado encontrado.</p>';
          return;
        }

        resultsDiv.innerHTML = filtered.map(item => {
          const isOcupado = item.status === 'ocupado';
          const clickAction = isOcupado ? 'onclick="window.location.href=\'/leito/' + item.id + '\'"' : '';
          return '<div class="search-result-item" style="padding:10px;cursor:' + (isOcupado ? 'pointer' : 'default') + ';' + (isOcupado ? '' : 'opacity:0.5;') + '" ' + clickAction + '>' +
            '<span style="font-weight:bold; color:#00B4D8;">Leito ' + item.numero + '</span>' +
            '<span style="color:#aaa;"> - ' + (item.status || 'disponivel') + '</span>' +
            (item.paciente_nome ? '<span style="display:block; color:#fff;">Paciente: ' + item.paciente_nome + '</span>' : '') +
          '</div>';
        }).join('');
      } catch (err) {
        resultsDiv.innerHTML = '<p class="no-results">Erro ao buscar.</p>';
      }
    }
  </script>
</body>

</html>
