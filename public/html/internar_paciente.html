<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internar Paciente - UTI Digital</title>
    <link
      rel="shortcut icon"
      href="/uploads/images/ui.png"
      type="image/x-icon"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/internar_paciente.css" />
  </head>

  <body>
    <div class="app">
      <header>
        <div class="logo">
          <img src="/uploads/images/ui.png" alt="UTI Digital" height="50px" />
        </div>
        <div class="badge-medico" id="roleBadge">...</div>
        <div class="doctor-name" id="doctorName">Carregando...</div>
      </header>

      <aside>
        <div class="menu-label">Menu Principal</div>

        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/gestao-leitos" class="nav-item">Gestao de Leitos</a>
        <a href="/cadastro-pacientes" class="nav-item">Cadastro de Pacientes</a>
        <a href="/relatorios" class="nav-item">Relatorios</a>
        <a href="#" class="nav-item" id="navCadastroUsuarios" style="display: none;">Cadastro de Usuarios</a>
        <form action="/auth/logout" method="POST" style="display:inline">
          <button type="submit" class="nav-item logout-btn" style="background:none;border:none;color:inherit;font:inherit;cursor:pointer;width:100%;text-align:left;padding:12px 16px;">Sair</button>
        </form>
      </aside>

      <main>
        <div class="breadcrumb">
          <a href="/gestao-leitos">Leitos</a>
          <span>/</span>
          <span class="current">Internar Paciente</span>
        </div>

        <h1 class="page-title">Internar Paciente</h1>

        <div class="internar-form-card">
          <div class="form-row">
            <div class="field-group full">
              <label class="field-label">Paciente</label>
              <select class="field-input" id="selectPaciente" required>
                <option value="">Selecione um paciente...</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="field-group">
              <label class="field-label">Leito</label>
              <select class="field-input" id="selectLeito" required>
                <option value="">Selecione um leito...</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Medico Responsavel</label>
              <select class="field-input" id="selectMedico" required>
                <option value="">Selecione um medico...</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="field-group full">
              <label class="field-label">Motivo da Admissao</label>
              <input
                class="field-input"
                type="text"
                id="motivoAdmissao"
                placeholder="Ex: Infarto agudo do miocardio"
                required minlength="5"
              />
            </div>
          </div>

          <div class="form-actions">
            <a href="/gestao-leitos" class="btn-cancelar">Cancelar</a>
            <button class="btn-internar" id="btnInternar">
              Internar Paciente
            </button>
          </div>
        </div>

        <div id="successMsg" class="success-message">
          Paciente internado com sucesso! Redirecionando...
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      async function loadPacientes() {
        try {
          const response = await fetch("/api/pacientes");
          if (!response.ok) throw new Error('Erro ao carregar pacientes');
          const pacientes = await response.json();
          const select = document.getElementById("selectPaciente");
          pacientes.forEach((p) => {
            const option = document.createElement("option");
            option.value = p.id;
            option.textContent = `${p.nome} - CPF: ${p.cpf}`;
            select.appendChild(option);
          });
        } catch (error) {
          console.error("Erro ao carregar pacientes:", error);
        }
      }

      async function loadLeitos() {
        try {
          const response = await fetch("/api/leitos");
          if (!response.ok) throw new Error('Erro ao carregar leitos');
          const leitos = await response.json();
          const select = document.getElementById("selectLeito");
          const disponiveis = leitos.filter((l) => l.status === "disponivel");
          if (disponiveis.length === 0) {
            const option = document.createElement("option");
            option.textContent = "Nenhum leito disponivel";
            select.appendChild(option);
            return;
          }
          disponiveis.forEach((l) => {
            const option = document.createElement("option");
            option.value = l.id;
            option.textContent = `Leito ${l.numero}`;
            select.appendChild(option);
          });
        } catch (error) {
          console.error("Erro ao carregar leitos:", error);
        }
      }

      async function loadMedicos() {
        try {
          const response = await fetch("/api/users?perfil=Medico");
          if (!response.ok) throw new Error('Erro ao carregar medicos');
          const medicos = await response.json();
          const select = document.getElementById("selectMedico");
          medicos.forEach((m) => {
            const option = document.createElement("option");
            option.value = m.id;
            option.textContent = m.name;
            select.appendChild(option);
          });
        } catch (error) {
          console.error("Erro ao carregar medicos:", error);
        }
      }

      document
        .getElementById("btnInternar")
        .addEventListener("click", async function () {
          const btn = this;
          const pacienteId = document.getElementById("selectPaciente").value;
          const leitoId = document.getElementById("selectLeito").value;
          const medicoId = document.getElementById("selectMedico").value;
          const motivo = document.getElementById("motivoAdmissao").value.trim();

          if (!pacienteId || !leitoId || !medicoId || !motivo) {
            alert("Por favor, preencha todos os campos.");
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Internando...';

          try {
            const allLeitosResp = await fetch("/api/leitos");
            if (!allLeitosResp.ok) throw new Error('Erro ao carregar leitos');
            const allLeitos = await allLeitosResp.json();

            const pacienteJaInternado = allLeitos.find(
              (l) =>
                l.paciente_id === parseInt(pacienteId) &&
                l.status === "ocupado",
            );
            if (pacienteJaInternado) {
              alert(
                "Este paciente já está internado no leito " +
                  pacienteJaInternado.numero +
                  ".Não é possível internar em outro leito.",
              );
              return;
            }

            const pacienteResp = await fetch("/api/pacientes/" + pacienteId);
            if (!pacienteResp.ok)
              throw new Error("Erro ao buscar dados do paciente");
            const paciente = await pacienteResp.json();

            const response = await fetch("/api/leitos/" + leitoId);
            if (!response.ok) throw new Error("Erro ao buscar dados do leito");
            const leito = await response.json();

            const updateResp = await fetch("/api/leitos/" + leitoId, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                status: "ocupado",
                paciente_nome: paciente.nome,
                paciente_id: paciente.id,
                medico_responsavel_id: parseInt(medicoId),
                motivo_admissao: motivo,
                data_internacao: new Date().toISOString(),
                data_nascimento_paciente: paciente.data_nascimento,
                cpf_paciente: paciente.cpf,
                observacoes: "",
              }),
            });

            if (!updateResp.ok) {
              const error = await updateResp.json();
              throw new Error(error.error || "Erro ao internar paciente");
            }

            const msg = document.getElementById("successMsg");
            msg.style.display = "block";
            setTimeout(() => {
              window.location.href = "/gestao-leitos";
            }, 2000);
          } catch (error) {
            console.error("Erro ao internar:", error);
            alert(error.message || "Erro ao internar paciente");
          } finally {
            btn.disabled = false;
            btn.textContent = 'Internar Paciente';
          }
        });

      loadUser();
      loadPacientes();
      loadLeitos();
      loadMedicos();
    </script>
  </body>
</html>
